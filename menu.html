<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <link rel="shortcut icon" type="x-icon" href="pictures/T.png">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: white;
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: #111;
            border: 1px solid #222;
            border-radius: 20px;
            padding: 60px 50px;
            text-align: center;
            width: 360px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 420px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 40px;
        }

        .buttons {
            width: 100%;
        }

        a {
            display: block;
            text-decoration: none;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 18px;
            padding: 16px;
            border-radius: 12px;
            transition: opacity 0.2s;
        }

        a:hover {
            opacity: 0.85;
        }

        .easy {
            background: #4ade80;
            color: #0a0a0a;
            margin-bottom: 12px;
        }

        .hard {
            background: #f87171;
            color: #0a0a0a;
            margin-bottom: 24px;
        }

        .back {
            font-size: 14px;
            color: #555;
            transition: color 0.2s;
        }

        .back:hover {
            color: #4ade80;
            opacity: 1;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Vyber obtížnost</h1>
    <div class="buttons">
        <a href="easymode.html" class="easy">Jednoduchá</a>
        <a href="hard.html" class="hard">Těžká</a>
        <a href="index.html" class="back">← Zpět</a>
    </div>
</div>
</body>
</html>
