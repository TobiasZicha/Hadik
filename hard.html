<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hadík – Hard</title>
    <link rel="shortcut icon" type="x-icon" href="pictures/T.png">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0a;
            color: white;
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        canvas {
            border: 2px solid #f87171;
            border-radius: 8px;
            display: block;
        }

        #score {
            font-size: 48px;
            font-weight: 800;
            color: #f87171;
            min-height: 60px;
        }

        #restart-hint {
            font-size: 14px;
            color: #555;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            min-height: 20px;
        }
    </style>
</head>
<body>
<div id="score">0</div>
<canvas width="600" height="600"></canvas>
<div id="restart-hint"></div>

<script>
    document.addEventListener("keydown", keyPush);

    const canvas = document.querySelector("canvas");
    const scoreEl = document.getElementById("score");
    const hintEl = document.getElementById("restart-hint");
    const ctx = canvas.getContext("2d");

    const tileSize = 60;
    const tileCountX = canvas.width / tileSize;
    const tileCountY = canvas.height / tileSize;

    let snakePosX = tileSize * 3;
    let snakePosY = tileSize * 5;
    let velocityX = 1;
    let velocityY = 0;
    let tail = [];
    let snakeLength = 2;
    let foodPosX = -1, foodPosY = -1;
    let dangerousFoodPos = [];
    let score = 0;
    let gameIsRunning = true;

    resetFood();
    gameLoop();

    function gameLoop() {
        if (gameIsRunning) {
            drawStuff();
            moveStuff();
            setTimeout(gameLoop, Math.max(60, 1000 / 10 - score * 3));
        }
    }

    function moveStuff() {
        snakePosX += tileSize * velocityX;
        snakePosY += tileSize * velocityY;

        if (snakePosX > canvas.width - tileSize) snakePosX = 0;
        if (snakePosX < 0) snakePosX = canvas.width - tileSize;
        if (snakePosY > canvas.height - tileSize) snakePosY = 0;
        if (snakePosY < 0) snakePosY = canvas.height - tileSize;

        tail.forEach(part => {
            if (snakePosX === part.x && snakePosY === part.y) gameOver();
        });

        tail.push({ x: snakePosX, y: snakePosY });
        tail = tail.slice(-snakeLength);

        if (snakePosX === foodPosX && snakePosY === foodPosY) {
            score++;
            snakeLength++;
            scoreEl.textContent = score;
            resetFood();
        }

        for (const d of dangerousFoodPos) {
            if (snakePosX === d.x && snakePosY === d.y) gameOver();
        }
    }

    function drawStuff() {
        rectangle("#0a0a0a", 0, 0, canvas.width, canvas.height);
        drawGrid();
        rectangle("#4ade80", foodPosX, foodPosY, tileSize, tileSize);
        for (const d of dangerousFoodPos) {
            rectangle("#f87171", d.x, d.y, tileSize, tileSize);
        }
        tail.forEach(part => rectangle("#22c55e", part.x, part.y, tileSize, tileSize));
        rectangle("white", snakePosX, snakePosY, tileSize, tileSize);
    }

    function rectangle(color, x, y, w, h) {
        ctx.fillStyle = color;
        ctx.fillRect(x, y, w, h);
    }

    function isOccupied(x, y, extraList = []) {
        if (snakePosX === x && snakePosY === y) return true;
        if (tail.some(p => p.x === x && p.y === y)) return true;
        if (extraList.some(p => p.x === x && p.y === y)) return true;
        return false;
    }

    function resetFood() {
        if (snakeLength === tileCountX * tileCountY) { gameOver(); return; }

        do {
            foodPosX = Math.floor(Math.random() * tileCountX) * tileSize;
            foodPosY = Math.floor(Math.random() * tileCountY) * tileSize;
        } while (isOccupied(foodPosX, foodPosY));

        const dangerCount = Math.min(3 + Math.floor(score / 3), 8);
        dangerousFoodPos = [];

        for (let i = 0; i < dangerCount; i++) {
            let dx, dy, attempts = 0;
            do {
                dx = Math.floor(Math.random() * tileCountX) * tileSize;
                dy = Math.floor(Math.random() * tileCountY) * tileSize;
                attempts++;
                if (attempts > 200) break;
            } while (
                isOccupied(dx, dy, dangerousFoodPos) ||
                (dx === foodPosX && dy === foodPosY)
                );
            dangerousFoodPos.push({ x: dx, y: dy });
        }
    }

    function gameOver() {
        gameIsRunning = false;
        scoreEl.innerHTML = `💀 ${score} 💀`;
        hintEl.textContent = "Stiskni libovolnou klávesu pro restart";
    }

    function keyPush(event) {
        switch (event.key) {
            case "ArrowLeft":  if (velocityX !== 1)  { velocityX = -1; velocityY = 0; } break;
            case "ArrowRight": if (velocityX !== -1) { velocityX = 1;  velocityY = 0; } break;
            case "ArrowUp":    if (velocityY !== 1)  { velocityX = 0;  velocityY = -1; } break;
            case "ArrowDown":  if (velocityY !== -1) { velocityX = 0;  velocityY = 1; } break;
            default:
                if (!gameIsRunning) location.reload();
                break;
        }
    }

    function drawGrid() {
        for (let i = 0; i < tileCountX; i++) {
            for (let j = 0; j < tileCountY; j++) {
                rectangle("#111", i * tileSize, j * tileSize, tileSize - 1, tileSize - 1);
            }
        }
    }
</script>
</body>
</html>
